<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños Adri</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}



#carrusel{
margin-top:40px;
position:relative;
z-index:2;
}

#foto{
width:360px;
height:430px;
object-fit:cover;
border-radius:12px;
box-shadow:0 0 25px white;
transition:opacity 1.5s;
}

#texto{
font-size:20px;
margin-top:15px;
}



#mensajeFinal{
display:none;
font-size:48px;
margin-top:220px;
color:#ffd700;
z-index:2;
position:relative;
}



.globo{
position:fixed;
bottom:-100px;
font-size:40px;
animation:subir linear forwards;
}

@keyframes subir{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}



canvas{
position:fixed;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="carrusel">

<img id="foto">

<p id="texto"></p>

</div>

<div id="mensajeFinal">

🎉 Feliz cumple hermana 🎉  
<br><br>
Te quiero mucho ❤️  
<br>
Que Dios la bendiga 🙏

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<canvas id="canvas"></canvas>

<script>


let fotos=[
"foto1.jpeg",
"foto2.jpeg",
"foto3.jpeg",

];

let mensajes=[
"Gracias por todos los momentos que hemos compartido ❤️",
"Eres una hermana maravillosa",
"Aunque estemos lejos siempre estás en mi corazón",
"Hoy celebramos tu vida 🎂"
];

let index=0;

let foto=document.getElementById("foto");
let texto=document.getElementById("texto");

foto.src=fotos[0];
texto.innerText=mensajes[0];



function cambiarFoto(){

foto.style.opacity=0;

setTimeout(()=>{

index++;

if(index < fotos.length){

foto.src=fotos[index];
texto.innerText=mensajes[index];
foto.style.opacity=1;

}else{

document.getElementById("carrusel").style.display="none";
document.getElementById("mensajeFinal").style.display="block";

iniciarFuegos();

clearInterval(intervalo);
clearInterval(globos);

}

},1000);

}

let intervalo=setInterval(cambiarFoto,5000);



function crearGlobo(){

let globo=document.createElement("div");

globo.className="globo";

globo.innerHTML="❤️";

globo.style.left=Math.random()*100+"vw";

let colores=["#ff69b4","#ffffff","#d4af37"];

globo.style.color=colores[Math.floor(Math.random()*3)];

globo.style.animationDuration=(Math.random()*6+6)+"s";

document.body.appendChild(globo);

setTimeout(()=>{
globo.remove();
},12000);

}

let globos=setInterval(crearGlobo,900);



function iniciarFuegos(){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let fireworks=[];
let particles=[];

class Firework{

constructor(){

this.x=Math.random()*canvas.width;
this.y=canvas.height;
this.targetY=Math.random()*canvas.height/2;
this.speed=6;
}

update(){

this.y-=this.speed;

if(this.y <= this.targetY){

for(let i=0;i<80;i++){

particles.push({
x:this.x,
y:this.y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5,
life:80,
color:`hsl(${Math.random()*360},100%,50%)`
});

}

return true;
}

}

draw(){

ctx.beginPath();
ctx.arc(this.x,this.y,3,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

}

}

function animar(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

if(Math.random()<0.05){
fireworks.push(new Firework());
}

fireworks.forEach((f,i)=>{

f.update();
f.draw();

if(f.y<=f.targetY){
fireworks.splice(i,1);
}

});

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

if(p.life<=0){
particles.splice(i,1);
}

});

requestAnimationFrame(animar);

}

animar();

}

</script>

</body>
</html>
